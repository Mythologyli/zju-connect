name: Build

on:
  release:
    types: [ published ]
  push:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yml"
  pull_request:
    types:
      - opened
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

permissions: write-all

jobs:
  build:
    strategy:
      matrix:
        # Include amd64 on all platforms.
        goos: [ windows, linux, darwin ]
        goarch: [ amd64, 386 ]
        exclude:
          # Exclude i386 on darwin.
          - goarch: 386
            goos: darwin
        include:
          # BEGIN Linux ARM 5 6 7
          - { goos: linux, goarch: arm, goarm: 7 }
          - { goos: linux, goarch: arm, goarm: 6 }
          - { goos: linux, goarch: arm, goarm: 5 }
          # END Linux ARM 5 6 7
          # BEGIN Windows ARM 7
          - { goos: windows, goarch: arm, goarm: 7 }
          # END Windows ARM 7
          # BEGIN Other architectures
          - { goos: darwin, goarch: arm64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: riscv64 }
          - { goos: windows, goarch: arm64 }
          # BEGIN MIPS
          - { goos: linux, goarch: mips64 }
          - { goos: linux, goarch: mips64le }
          - { goos: linux, goarch: mipsle }
          - { goos: linux, goarch: mips }
          # END MIPS
          # END Other architectures
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v3

      - name: Show workflow information
        id: get_filename
        run: |
          export _NAME=$GOOS-$GOARCH$GOARM
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, RELEASE_NAME: $_NAME"
          echo "ASSET_NAME=$_NAME" >> $GITHUB_OUTPUT
          echo "ASSET_NAME=$_NAME" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ^1.25

      - name: Get project dependencies
        run: go mod download

      - name: Build
        run: |
          mkdir -p build_assets
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION_FLAGS=""
          else
            VERSION_FLAGS="-X 'main.CommitID=${SHORT_SHA}'"
          fi
          go build -v -o build_assets/zju-connect -trimpath \
            -ldflags "-s -w -buildid= ${VERSION_FLAGS}" .

      - name: Rename Windows zju-connect
        if: matrix.goos == 'windows'
        run: |
          cd ./build_assets || exit 1
          mv zju-connect zju-connect.exe

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: zju-connect-${{ steps.get_filename.outputs.ASSET_NAME }}
          path: build_assets/*

      - name: Create ZIP archive
        if: github.event_name == 'release' || (github.event_name == 'push' && contains(vars.NIGHTLY_RELEASE_ENABLED_BRANCHES, github.ref_name))
        run: |
          pushd build_assets || exit 1
          zip -9vr ../zju-connect-$ASSET_NAME.zip .
          popd || exit 1

      - name: Upload release binary
        if: github.event_name == 'release' || (github.event_name == 'push' && contains(vars.NIGHTLY_RELEASE_ENABLED_BRANCHES, github.ref_name))
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload --clobber ${{ github.event_name == 'release' && github.event.release.tag_name || 'nightly' }} zju-connect-${{ steps.get_filename.outputs.ASSET_NAME }}.zip

  update-aur:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: Update AUR package
        run: |
          set -euo pipefail

          if [ -z "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "::error::AUR_SSH_PRIVATE_KEY is not set"
            exit 1
          fi

          TAG="${{ github.event.release.tag_name }}"
          PKGVER="${TAG#v}"
          PKGVER="${PKGVER//-/_}"

          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          git clone ssh://aur@aur.archlinux.org/zju-connect-bin.git aur-package
          cd aur-package

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OLD_PKGVER="$(grep -E '^pkgver=' PKGBUILD | cut -d= -f2-)"
          OLD_PKGREL="$(grep -E '^pkgrel=' PKGBUILD | cut -d= -f2-)"
          if [ "${OLD_PKGVER}" = "${PKGVER}" ]; then
            PKGREL="$((OLD_PKGREL + 1))"
          else
            PKGREL=1
          fi

          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${PKGREL}/" PKGBUILD

          docker run --rm -v "$PWD:/pkg" -w /pkg archlinux:base-devel bash <<'EOF'
          set -euo pipefail
          pacman -Sy --noconfirm pacman-contrib
          useradd -m builder
          chown -R builder:builder /pkg
          su builder -c 'cd /pkg && updpkgsums && makepkg --printsrcinfo > .SRCINFO'
          EOF

          git diff --check
          if git diff --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi

          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${TAG}"
          git push

  nightly:
    if: github.event_name != 'release' && github.event_name == 'push' && contains(vars.NIGHTLY_RELEASE_ENABLED_BRANCHES, github.ref_name)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v3

      - name: Move nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push origin nightly --force
